# ============================================================
# CONCEPT: Sources in dbt
# This file tells dbt WHERE your raw data comes from.
# Instead of hardcoding database.schema.table everywhere,
# you define it once here and reference it as source()
# Benefits:
#   - Source freshness testing
#   - Lineage graph shows external sources
#   - Change connection in one place
# ============================================================

version: 2

sources:
  - name: raw
    database: HEALTHFLOW_DB
    schema: RAW
    description: "Bronze layer — raw data loaded from source CSVs via Snowflake COPY INTO"

    tables:
      - name: patients
        description: "Raw patient demographics from hospital EMR system"
        columns:
          - name: patient_id
            description: "Unique patient identifier"
            tests:
              - not_null
              - unique

      - name: doctors
        description: "Raw doctor and staff information"
        columns:
          - name: doctor_id
            tests:
              - not_null
              - unique

      - name: departments
        description: "Hospital departments reference data"
        columns:
          - name: department_id
            tests:
              - not_null
              - unique

      - name: appointments
        description: "Patient visit and appointment records"
        columns:
          - name: visit_id
            tests:
              - not_null
              - unique
          - name: patient_id
            tests:
              - not_null
          - name: doctor_id
            tests:
              - not_null
          - name: status
            tests:
              - accepted_values:
                  values: ['Completed','Cancelled','No-Show','Pending']

      - name: lab_results
        description: "Laboratory test orders and results"
        columns:
          - name: lab_id
            tests:
              - not_null
              - unique
          - name: is_abnormal
            tests:
              - accepted_values:
                  values: ['Y', 'N']

      - name: billing
        description: "Patient billing and payment records"
        columns:
          - name: billing_id
            tests:
              - not_null
              - unique
          - name: payment_status
            tests:
              - accepted_values:
                  values: ['Paid','Pending','Overdue','Waived']